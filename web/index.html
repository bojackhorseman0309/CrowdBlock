<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrowdBlock DApp</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6fb;
        --card: #ffffff;
        --text: #1f2a37;
        --muted: #5b6778;
        --primary: #0f766e;
        --primary-strong: #0b5d57;
        --danger: #b91c1c;
        --border: #d7deea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 8px;
        color: var(--muted);
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      input {
        flex: 1 1 420px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 0.95rem;
      }

      button {
        border: 1px solid var(--primary);
        background: var(--primary);
        color: #fff;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: var(--primary-strong);
      }

      button.secondary {
        background: #fff;
        color: var(--primary);
      }

      button.secondary:hover {
        background: #eef9f8;
      }

      .status {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .candidate {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .candidate strong {
        display: inline-block;
        margin-bottom: 6px;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      @media (min-width: 980px) {
        .grid-cols-2 {
          grid-template-columns: 1fr 1fr;
        }
      }

      .section-title {
        margin: 0 0 14px;
        font-size: 1.2rem;
        color: var(--primary-strong);
      }

      .form-group {
        margin-bottom: 10px;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
      }

      textarea {
        width: 100%;
        min-height: 72px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        resize: vertical;
        font-size: 0.95rem;
      }

      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="card">
        <h1>CrowdBlock</h1>
        <p>Decentralized crowdfunding management with Web3 wallets and campaign tracking.</p>
        <div class="row">
          <button id="connectBtn">Connect MetaMask</button>
          <button id="switchAmoyBtn" class="secondary">Switch to Amoy</button>
          <button id="refreshBtn" class="secondary">Refresh</button>
        </div>
      </header>

      <section class="card">
        <h2 class="section-title">Wallet & Network</h2>
        <p><strong>Account:</strong> <span id="account">Not connected</span></p>
        <p><strong>Network:</strong> <span id="network">Unknown</span></p>
        <p><strong>Status:</strong> <span id="statusText">Ready</span></p>
      </section>

      <section class="card">
        <h2 class="section-title">Campaign Actions</h2>
        <div class="grid grid-cols-2">
          <div>
            <h3>Create Campaign</h3>
            <div class="form-group"><label for="campaignTitle">Title</label><input id="campaignTitle" placeholder="Campaign title" /></div>
            <div class="form-group"><label for="campaignGoal">Goal (ETH)</label><input id="campaignGoal" placeholder="e.g., 5" /></div>
            <div class="form-group"><label for="campaignDeadline">Deadline</label><input type="date" id="campaignDeadline" /></div>
            <div class="form-group"><label for="campaignDescription">Description</label><textarea id="campaignDescription" placeholder="Describe the campaign"></textarea></div>
            <button id="createCampaignBtn">Create Campaign</button>
          </div>

          <div>
            <h3>Make a Donation</h3>
            <div class="form-group"><label for="campaignSelector">Select Campaign</label><select id="campaignSelector"><option value="">No campaigns loaded</option></select></div>
            <div class="form-group"><label for="donationAmount">Amount (ETH)</label><input id="donationAmount" placeholder="0.1" /></div>
            <button id="makeADonationBtn" class="secondary">Donate</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">Live Campaigns</h2>
        <div id="campaignList" class="grid"></div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
